name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/megaminx-rl-environment
      - codex/megaminx-direction-breakthrough

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run tests
        run: uv run pytest

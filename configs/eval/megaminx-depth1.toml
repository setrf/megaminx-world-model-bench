[[eval]]
env_id = "setrf/megaminx-solver"
model = "Qwen/Qwen3.5-4B"
api_client_type = "openai_chat_completions"
num_examples = 10
rollouts_per_example = 3
max_tokens = 512
temperature = 0.7
sampling_args = { tool_choice = "required" }

[eval.args]
split = "depth1"
num_examples = 30
max_turns = 2
reward_style = "action_gated_dense"
prompt_style = "action_first"

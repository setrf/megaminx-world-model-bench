[[eval]]
env_id = "setrf/megaminx-solver"
model = "Qwen/Qwen3.5-0.8B"
api_client_type = "openai_chat_completions"
num_examples = 30
rollouts_per_example = 1
max_tokens = 48
temperature = 0.7
sampling_args = { tool_choice = { type = "function", function = { name = "rotate" } } }

[eval.args]
split = "depth1"
num_examples = 30
max_turns = 2
reward_style = "action_gated_curriculum"
prompt_style = "sensor_match_json_action"
allow_text_tool_actions = true


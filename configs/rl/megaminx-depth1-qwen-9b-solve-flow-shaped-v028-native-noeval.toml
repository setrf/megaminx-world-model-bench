name = "megaminx-depth1-qwen9b-solve-flow-shaped-v028-native-noeval"
model = "Qwen/Qwen3.5-9B"
max_steps = 140
batch_size = 256
rollouts_per_example = 16
learning_rate = 3e-7
lora_alpha = 16
oversampling_factor = 1.0
max_async_level = 1

[sampling]
max_tokens = 48
temperature = 0.7
enable_thinking = false

[sampling.extra_body]
tool_choice = { type = "function", function = { name = "rotate" } }

[[env]]
id = "setrf/megaminx-solver"
version = "0.2.28"

[env.args]
split = "train_depth1"
num_examples = 960
seed = 42
max_turns = 2
move_budget = 1
reward_style = "action_gated_strict_shaped_direction"
prompt_style = "stage_solve_direction_flow_native_tool"
allow_text_tool_actions = false

[checkpoints]
interval = 10
keep_cloud = 5

[adapters]
interval = 10
keep_last = 5


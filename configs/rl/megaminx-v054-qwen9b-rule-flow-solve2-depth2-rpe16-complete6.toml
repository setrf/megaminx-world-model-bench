name = "megaminx-v054-qwen9b-rule-flow-solve2-depth2-rpe16-complete6"
model = "Qwen/Qwen3.5-9B"
max_steps = 6
batch_size = 512
rollouts_per_example = 16
learning_rate = 3e-9
lora_alpha = 16
oversampling_factor = 1.0
max_async_level = 1

[sampling]
max_tokens = 64
temperature = 0.8
enable_thinking = false

[sampling.extra_body]
tool_choice = { type = "function", function = { name = "select_candidate" } }
parallel_tool_calls = false

[buffer]
online_difficulty_filtering = false
seed = 57

[[env]]
id = "setrf/megaminx-solver"
version = "0.2.54"

[env.args]
split = "train_candidate_relative_flow_rule_solve2_depth2"
min_depth = 2
max_depth = 2
num_examples = 2048
seed = 46
max_turns = 4
move_budget = 2
reward_style = "action_gated_candidate_path_solve"
prompt_style = "stage_candidate_relative_flow_rule_solve2_native_tool"
allow_text_tool_actions = false

[checkpoints]
interval = 1
keep_cloud = 6

[adapters]
interval = 1
keep_last = 6

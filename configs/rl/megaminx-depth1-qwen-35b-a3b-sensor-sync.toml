name = "megaminx-depth1-qwen35b-a3b-match-small-t07"
model = "Qwen/Qwen3.5-35B-A3B"
max_steps = 30
batch_size = 128
rollouts_per_example = 8
learning_rate = 5e-8
lora_alpha = 16
oversampling_factor = 1.0
max_async_level = 1

[sampling]
max_tokens = 48
temperature = 0.7
enable_thinking = false

[sampling.extra_body]
tool_choice = { type = "function", function = { name = "rotate" } }

[[env]]
id = "setrf/megaminx-solver"
version = "0.2.17"

[env.args]
split = "train_depth1"
num_examples = 500
max_turns = 2
reward_style = "action_gated_curriculum"
prompt_style = "sensor_match_json_action"
allow_text_tool_actions = true

[eval]
interval = 5
num_examples = 40
rollouts_per_example = 1
eval_base_model = true

[[eval.env]]
id = "setrf/megaminx-solver"
name = "eval_depth1"
version = "0.2.17"

[eval.env.args]
split = "eval_depth1"
num_examples = 120
max_turns = 2
reward_style = "action_gated_curriculum"
prompt_style = "sensor_match_json_action"
allow_text_tool_actions = true

[[eval.env]]
id = "setrf/megaminx-solver"
name = "easy"
version = "0.2.17"

[eval.env.args]
split = "easy"
num_examples = 60
max_turns = 8
reward_style = "action_gated_curriculum"
prompt_style = "sensor_match_json_action"
allow_text_tool_actions = true

[checkpoints]
interval = 5
keep_cloud = 2

[adapters]
interval = 5
keep_last = 2

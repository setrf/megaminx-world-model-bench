name = "megaminx-v028-native-heldout-probe-step30-rpe4"
model = "Qwen/Qwen3.5-9B"
checkpoint_id = "wvubeopn9vy9syf8n8gnr4c2"
max_steps = 31
batch_size = 960
rollouts_per_example = 4
learning_rate = 1e-9
lora_alpha = 16
oversampling_factor = 1.0
max_async_level = 1

[sampling]
max_tokens = 48
temperature = 0.7
enable_thinking = false

[sampling.extra_body]
tool_choice = { type = "function", function = { name = "rotate" } }

[buffer]
skip_verification = true

[[env]]
id = "setrf/megaminx-solver"
version = "0.2.28"

[env.args]
split = "eval_depth1"
num_examples = 240
seed = 1042
max_turns = 2
move_budget = 1
reward_style = "action_gated_binary_direction"
prompt_style = "stage_solve_direction_flow_native_tool"
allow_text_tool_actions = false

[checkpoints]
interval = 1000
keep_cloud = 1

[adapters]
interval = 1000
keep_last = 1

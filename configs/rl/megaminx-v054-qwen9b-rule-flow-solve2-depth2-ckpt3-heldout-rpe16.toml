name = "megaminx-v054-qwen9b-rule-flow-solve2-depth2-ckpt3-heldout-rpe16"
model = "Qwen/Qwen3.5-9B"
checkpoint_id = "ce4skj0ockwhx4zq7ztutsap"
max_steps = 4
batch_size = 512
rollouts_per_example = 16
learning_rate = 1e-12
lora_alpha = 16
oversampling_factor = 1.0
max_async_level = 1

[sampling]
max_tokens = 64
temperature = 0.8
enable_thinking = false

[sampling.extra_body]
tool_choice = { type = "function", function = { name = "select_candidate" } }
parallel_tool_calls = false

[buffer]
skip_verification = true
seed = 157

[[env]]
id = "setrf/megaminx-solver"
version = "0.2.54"

[env.args]
split = "heldout_candidate_relative_flow_rule_solve2_depth2"
min_depth = 2
max_depth = 2
num_examples = 1024
seed = 146
max_turns = 4
move_budget = 2
reward_style = "action_gated_candidate_path_solve"
prompt_style = "stage_candidate_relative_flow_rule_solve2_native_tool"
allow_text_tool_actions = false

[checkpoints]
interval = 1000
keep_cloud = 1

[adapters]
interval = 1000
keep_last = 1

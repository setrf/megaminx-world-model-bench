name = "megaminx-v054-qwen9b-rule-flow-solve2-depth2-lr1e9-b1024-rpe16-tailroom8"
model = "Qwen/Qwen3.5-9B"
max_steps = 8
batch_size = 1024
rollouts_per_example = 16
learning_rate = 1e-9
lora_alpha = 16
oversampling_factor = 1.0
max_async_level = 1

[sampling]
max_tokens = 64
temperature = 0.8
enable_thinking = false

[sampling.extra_body]
tool_choice = { type = "function", function = { name = "select_candidate" } }
parallel_tool_calls = false

[buffer]
online_difficulty_filtering = false
seed = 59

[[env]]
id = "setrf/megaminx-solver"
version = "0.2.54"

[env.args]
split = "train_candidate_relative_flow_rule_solve2_depth2_lr1e9"
min_depth = 2
max_depth = 2
num_examples = 4096
seed = 64
max_turns = 4
move_budget = 2
reward_style = "action_gated_candidate_path_solve"
prompt_style = "stage_candidate_relative_flow_rule_solve2_native_tool"
allow_text_tool_actions = false

[checkpoints]
interval = 2
keep_cloud = 4

[adapters]
interval = 2
keep_last = 4
